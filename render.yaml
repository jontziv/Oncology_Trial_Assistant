services:
  - type: web
    name: oncology-trial-assistant-api
    runtime: python
    rootDir: apps/api
    buildCommand: uv sync --frozen --no-dev --active
    startCommand: python -m uvicorn copilot.main:app --app-dir src --host 0.0.0.0 --port 10000
    healthCheckPath: /health/ready
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: APP_ENV
        value: production
      - key: AUTH_DISABLED
        value: "false"
      - key: DEMO_ACCESS_ENABLED
        value: "false"
      - key: DEMO_USER_ID
        value: 00000000-0000-0000-0000-000000000001
      - key: APP_CORS_ORIGINS
        value: '["https://oncology-trial-assistant-web.vercel.app"]'
      - key: CLINICAL_TRIALS_BASE_URL
        value: https://clinicaltrials.gov/api/v2
      - key: CLINICAL_TRIALS_FALLBACK_BASE_URL
        value: https://oncology-trial-assistant-web.vercel.app/api/clinical-trials
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: NCBI_EMAIL
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
